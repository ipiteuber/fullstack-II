<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito - Link Start!</title>
  <meta name="description" content="Revisa los juegos de mesa en tu carrito de compras.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-base="">

  <header class="site-header">
    <h1 class="site-logo">LINK START!</h1>
    <p class="site-tagline">Conecta. Juega. Gana.</p>
  </header>

  <nav class="main-nav" aria-label="Navegación principal">
    <ul>
      <li><a href="index.html">Inicio</a></li>
    </ul>
  </nav>

  <main>

    <section class="hero">
      <h1>Tu <span class="highlight">carrito</span></h1>
      <p>Revisa tus juegos antes de finalizar la compra.</p>
    </section>

    <section>
      <div class="ls-panel" id="carrito-panel">
        <div id="carrito-vacio" class="empty-state" hidden>
          <p>Tu carrito está vacío.</p>
          <p><a href="index.html">Ver el catálogo &rarr;</a></p>
        </div>

        <div id="carrito-contenido" hidden>
          <table class="ls-table">
            <thead>
              <tr>
                <th colspan="2">Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="carrito-body"></tbody>
          </table>

          <div class="cart-summary">
            <button class="btn-mini" id="btn-vaciar">Vaciar carrito</button>
            <div>
              <span class="form-intro" style="margin:0">Total: </span>
              <span class="total" id="carrito-total">$0</span>
            </div>
          </div>

          <div class="form-actions">
            <a href="pago.html" class="btn-neon btn-neon--primary" id="btn-pagar">Finalizar compra</a>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Link Start! - Todos los derechos reservados.</p>
    <p><a href="index.html">&larr; Volver al inicio</a></p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/carrito.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/carrito-page.js"></script>

</body>
</html>
