<section>
  <h2 class="section-title">{{ categoriaNombre }}</h2>

  <div class="catalogo-buscador">
    <label class="form-label" for="buscar">Buscar juego</label>
    <input
      id="buscar"
      type="text"
      class="form-control"
      placeholder="Escribe un nombre..."
      [(ngModel)]="filtro"
      name="filtro">
  </div>

  <p class="empty-state" *ngIf="productosFiltrados.length === 0">
    No se encontraron juegos en esta categoría.
  </p>

  <div class="games-grid row g-4">
    <div class="col-12 col-md-6 col-lg-4" *ngFor="let prod of productosFiltrados">
      <app-game-card
        [producto]="prod"
        [feedback]="feedback && feedback.id === prod.id ? { texto: feedback.texto, tipo: feedback.tipo } : null"
        (agregar)="agregar($event)">
      </app-game-card>
    </div>
  </div>
</section>
