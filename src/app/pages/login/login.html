<section class="form-wrap">
  <form class="register-card" [formGroup]="form" (ngSubmit)="enviar()" novalidate>
    <h2 class="section-title">Iniciar sesión</h2>

    <p class="form-success show" [class.form-success--error]="esError" *ngIf="mensaje">{{ mensaje }}</p>

    <div class="form-field">
      <label class="form-label" for="usuario">Usuario o correo</label>
      <input
        id="usuario"
        type="text"
        class="form-control"
        formControlName="usuario"
        [class.is-invalid]="form.controls.usuario.invalid && form.controls.usuario.touched">
      <p class="field-error show" *ngIf="form.controls.usuario.invalid && form.controls.usuario.touched">
        !! Ingresa tu usuario o correo.
      </p>
    </div>

    <div class="form-field">
      <label class="form-label" for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        class="form-control"
        formControlName="password"
        [class.is-invalid]="form.controls.password.invalid && form.controls.password.touched">
      <p class="field-error show" *ngIf="form.controls.password.invalid && form.controls.password.touched">
        !! Ingresa tu contraseña.
      </p>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-neon btn-neon--primary">Ingresar</button>
      <button type="button" class="btn-neon btn-neon--ghost" (click)="limpiar()">Limpiar</button>
    </div>

    <p class="form-links">
      <a routerLink="/recuperar">¿Olvidaste tu contraseña?</a>
      <a routerLink="/registro">¿No tienes cuenta? Regístrate</a>
    </p>
  </form>
</section>
